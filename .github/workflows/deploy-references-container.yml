name: Deploy References Container
on: [push]

jobs:
  Deploy-References-Container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REMOTE_HOST: bleubeupe
      REMOTE_VOLUME_DIR: /volume2/new_docker/references/
      DOCKER_COMPOSE_PATH: /usr/local/bin/docker-compose
    steps:
      - uses: actions/checkout@v3

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file
        run: echo "IMAGE_NAME=${{ env.IMAGE_NAME }}" > .env

      - name: Copy files via rsync (SSH)
        run:
          rsync -av ./docker-compose.yml ./.env ${{ env.REMOTE_HOST }}@${{ secrets.SSH_HOST }}:${{
          env.REMOTE_VOLUME_DIR }}

      - name: Run docker compose file
        run: |
          ssh ${{ env.REMOTE_HOST }}@${{ secrets.SSH_HOST }} 'bash -s' <<EOF
          echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          cd ${{ env.REMOTE_VOLUME_DIR }}
          ${{ env.DOCKER_COMPOSE_PATH }} pull
          ${{ env.DOCKER_COMPOSE_PATH }} up -d
          EOF
